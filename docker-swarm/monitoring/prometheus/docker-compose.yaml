---
version: '3.8'

services:
  prometheus_1:
    image: prom/prometheus:v3.8.1
    user: "1008:1008"
    stdin_open: true
    tty: true
    labels:
     logging: "promtail"
    environment:
     - TZ=Europe/Moscow
    volumes:
      - /mnt/prometheus-1/configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/prometheus-1/prometheus_data:/prometheus
      - /mnt/prometheus-1/configs/monitoring.crt:/etc/prometheus/monitoring.crt:ro
      - /mnt/prometheus-1/configs/alertmanager.yml:/etc/prometheus/alertmanager.yml:ro
      - /mnt/prometheus-1/configs/node-exporter-rules.yml:/etc/prometheus/node-exporter-rules.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=5d'
    networks:
      - monitoring_traefik_proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - "node.hostname == "
      resources:
        limits:
          cpus: '2' 
          memory: 10G
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      labels:
         - "traefik.enable=true"
         - "traefik.http.routers.prometheus-light.rule=Host(`prometheus-light.monitoring.test.local`)"
         - "traefik.http.routers.prometheus-light.entrypoints=websecure"
         - "traefik.http.routers.prometheus-light.tls=true"
         - "traefik.http.services.prometheus-light.loadbalancer.server.port=9090"
         - "com.containrrr.watchtower.enable=false"
    
