---
version: '3.8'

services:
  traefik:
    image: traefik:v3.6
    stdin_open: true
    tty: true
    labels:
      logging: "promtail"
    networks:
      - monitoring_traefik_proxy
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 8899
        published: 8899
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/traefik/certs:/certs:ro
      - /mnt/traefik/dynamic:/dynamic:ro
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--providers.file.filename=/dynamic/tls.yaml"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.watch=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=monitoring_traefik_proxy"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--entrypoints.metrics.address=:8899"
      - "--metrics.prometheus.entryPoint=metrics"
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits: 
          cpus: '0.5'
          memory: 512MB
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`traefik.monitoring.test.local`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.tls=true"
        - "traefik.http.middlewares.dashboard-auth.basicauth.users=traefik_local_admin:$$apr1$$YE7xr9R7$$idstOsSrEpy8h8cNripKX/"
        - "traefik.http.routers.dashboard.middlewares=dashboard-auth@swarm"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

networks:
 monitoring_traefik_proxy:
   external: true